version: '3.8'

services:
  mediscribe-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    networks:
      - mediscribe-network

networks:
  mediscribe-network:
    driver: bridge
